<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>SnapSend</title>
    <meta
      name="title"
      content="SnapSend - Fast P2P File Transfer | Secure WebRTC File Sharing"

      name="description"

      content="file transfer, P2P, peer-to-peer, WebRTC, secure file sharing, instant transfer, no registration, browser file sharing, direct transfer"
    />
    <meta name="author" content="SnapSend" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://snapsend.app/" />

      property="og:title"

      property="og:description"
      content="Transfer files instantly and securely with SnapSend's peer-to-peer WebRTC technology. No uploads, no downloads, no registration required."
    />

      property="og:image"
      content="https://snapsend.app/logo.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="SnapSend" />

      property="twitter:title"
      content="SnapSend - Fast P2P File Transfer | Secure WebRTC File Sharing"
    />

      property="twitter:description"
      content="Transfer files instantly and securely with SnapSend's peer-to-peer WebRTC technology. No uploads, no downloads, no registration required."

    <meta
      property="twitter:image"
      content="https://snapsend.app/social-preview.jpg"

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="canonical" href="https://snapsend.vercel.app/" />
